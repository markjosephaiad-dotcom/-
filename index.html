<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مسابقات كنيسة أبي سيفين - النسخة الكاملة</title>
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=9E66FmsY"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --maroon: #580F0F; --gold: #C5A059; --cream: #FAF8F5; }
        body { font-family: sans-serif; background: var(--cream); padding: 20px; text-align: center; }
        .container { max-width: 700px; margin: auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .holy-images { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .holy-images img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--gold); }
        .page { display: none; } .active { display: block; }
        select, input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { background: var(--maroon); color: white; border: none; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        .btn-act { padding: 4px; font-size: 11px; margin: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="holy-images">
        <img src="abusafein.jpg" alt="أبي سيفين">
        <img src="virgin.jpg" alt="العذراء">
    </div>

    <!-- الإعدادات -->
    <div id="settingsPage" class="page active">
        <h2>إعدادات النظام</h2>
        <input type="file" id="qFile" onchange="loadExcel(this, 'questions')">
        <input type="file" id="cFile" onchange="loadExcel(this, 'chapter')">
        <button onclick="switchPage('loginPage')">الدخول للنظام</button>
    </div>

    <!-- الدخول -->
    <div id="loginPage" class="page">
        <h2>تسجيل دخول</h2>
        <select id="servantSelect"><option value="">-- اختر اسمك --</option></select>
        <input type="number" id="pass" placeholder="الكود السري">
        <button onclick="login()">دخول</button>
        <button style="background:#555" onclick="switchPage('adminPage')">لوحة التحكم</button>
    </div>

    <!-- لوحة التحكم -->
    <div id="adminPage" class="page">
        <h2>النتائج</h2>
        <table id="adminTable"><thead><tr><th>الاسم</th><th>الدرجة</th><th>إجراءات</th></tr></thead><tbody id="adminBody"></tbody></table>
        <button onclick="switchPage('loginPage')">رجوع</button>
    </div>
</div>

<script>
    const SERVANTS = {
        "ابراهيم عادل": "1", "ابو الخير": "2", "ايريني سمير": "3", "ايريني عاطف": "4", "امال سامي": "5",
        "توني هاني": "6", "ثناء زكريا": "7", "جاكلين سعيد": "8", "جانيت ويصا": "9", "جمال حنا": "10",
        "جورج فايز": "11", "جيرمين زاهر": "12", "جيهان شحاتة": "13", "جيهان ماهر": "14", "رأفت خير": "15",
        "رامز امير": "16", "رامي سعيد": "17", "رؤوف خير": "18", "رمزي سعيد": "19", "سارة عماد": "20",
        "سامية جريس": "21", "ساندرا جورج": "22", "سماح حلمي": "23", "سماح نعيم": "24", "سمر جادالرب": "25",
        "سمير زكي": "26", "سناء سعيد": "27", "شريف شهدي": "28", "شكرالله نصر": "29", "شيري شهدي": "30",
        "صفاء سمير": "31", "صفاء عادلي": "32", "عادل فرج": "33", "عايدة معوض": "34", "عايده يعقوب": "35",
        "عدلي رمزي": "36", "عماد سمير": "37", "فادي سليمان": "38", "فادي كحيل": "39", "فيوليت فوزي": "40",
        "كمال كريم": "41", "كريستين نصر": "42", "كريم شكرالله": "43", "كيرلس اسامه": "44", "كيرلس فادي": "45",
        "كيرلس يوسف": "46", "ليلي وهيب": "47", "ماجدة نجيب": "48", "ماركو مجدي": "49", "ماري عادل": "50",
        "ماري وجيه": "51", "ماريان مجدي": "52", "ماريانا ادورد": "53", "مارينا اشرف": "54", "مريان عادل": "55",
        "مريم عماد": "56", "مريم مكرم": "57", "منى ميشيل": "58", "ميرفت يعقوب": "59", "ميرنا عماد": "60",
        "مينا اشرف": "61", "مينا مجدي": "62", "ناهد فاروق": "63", "نرجس خير": "64", "نرمين سليمان": "65",
        "نعمة عبدالسيد": "66", "هيلانة جورج": "67", "وائل ماهر": "68", "ورده ماهر": "69", "ياسر نبيه": "70"
    };

    // تعبئة الخدام
    const select = document.getElementById('servantSelect');
    Object.keys(SERVANTS).sort().forEach(n => { let o = document.createElement('option'); o.value=n; o.innerHTML=n; select.appendChild(o); });

    function switchPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'adminPage') renderAdmin();
    }

    function loadExcel(el, type) {
        const file = el.files[0];
        const reader = new FileReader();
        reader.onload = e => {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            localStorage.setItem("data_"+type, JSON.stringify(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])));
            alert("تم تحميل " + type);
        };
        reader.readAsArrayBuffer(file);
    }

    function renderAdmin() {
        let scores = JSON.parse(localStorage.getItem("scores")) || {};
        let body = document.getElementById('adminBody');
        body.innerHTML = "";
        for (let n in scores) {
            body.innerHTML += `<tr><td>${n}</td><td>${scores[n]}</td>
            <td>
                <button class="btn-act" onclick="editS('${n}')">تعديل</button>
                <button class="btn-act" style="background:#b71c1c" onclick="delS('${n}')">مسح</button>
            </td></tr>`;
        }
    }

    function editS(n) { let s = prompt("الدرجة الجديدة:"); if(s) { let sc = JSON.parse(localStorage.getItem("scores")); sc[n]=s; localStorage.setItem("scores", JSON.stringify(sc)); renderAdmin(); } }
    function delS(n) { let sc = JSON.parse(localStorage.getItem("scores")); delete sc[n]; localStorage.setItem("scores", JSON.stringify(sc)); renderAdmin(); }
    function login() { alert("تم تسجيل الدخول!"); }
</script>
</body>
</html>
